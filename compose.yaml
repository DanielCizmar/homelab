name: homelab

services:
  alloy:
    image: grafana/alloy:v1.17.1
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    environment:
      GRAFANA_CLOUD_METRICS_URL: ${GRAFANA_CLOUD_METRICS_URL:?GRAFANA_CLOUD_METRICS_URL is required}
      GRAFANA_CLOUD_METRICS_USERNAME: ${GRAFANA_CLOUD_METRICS_USERNAME:?GRAFANA_CLOUD_METRICS_USERNAME is required}
      GRAFANA_CLOUD_METRICS_PASSWORD: ${GRAFANA_CLOUD_METRICS_PASSWORD:?GRAFANA_CLOUD_METRICS_PASSWORD is required}
      ALLOY_HOSTNAME: ${ALLOY_HOSTNAME:?ALLOY_HOSTNAME is required}
    volumes:
      - ./services/alloy/config/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    ports:
      - "127.0.0.1:12345:12345"
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    name: homelab_monitoring

volumes:
  alloy-data:
    name: homelab_alloy-data
